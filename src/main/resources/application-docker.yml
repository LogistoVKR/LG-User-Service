server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/logisto
    username: logisto
    password: logisto
    hikari:
      minimum-idle: 2
      maximum-pool-size: 4
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/logisto/protocol/openid-connect/certs
